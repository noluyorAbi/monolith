name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Types
        run: npx tsc --noEmit
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://example.com
